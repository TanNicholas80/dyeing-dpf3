events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;  # ✅ tambahan untuk upload file

    # Aplikasi utama (Laravel)
    server {
        listen 80;
        server_name _;

        root /var/www/public;
        index index.php index.html;

         # ✅ Static assets langsung serve tanpa PHP
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass php-fpm:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 300;  # ✅ hindari timeout untuk proses lama
            include fastcgi_params;
        }

        # ✅ Sembunyikan file sensitif
        location ~ /\.(env|git|htaccess) {
            deny all;
        }
    }

    # Subdomain WebSocket (Laravel Reverb) - ws.dpf3dunia.com
    server {
        listen 80;
        server_name ws.dpf3dunia.com;

        location / {
            proxy_pass http://reverb:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}